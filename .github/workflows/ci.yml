name: CI

on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install '.[dev]'
      - run: python -m pytest
      - run: python -m mypy tests/typecheck
      - run: pyright tests/typecheck
      - run: python -m mypy.stubtest httpretty --allowlist stubtest_allowlist.txt
      - if: matrix.python-version == '3.14'
        run: ruff check . && ruff format --check .
      - if: matrix.python-version == '3.14'
        run: python -m build && check-wheel-contents dist/*.whl && twine check dist/*
